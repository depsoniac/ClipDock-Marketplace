<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipDock Marketplace</title>
  <style>
    :root{color-scheme:dark;--bg:#080a0d;--card:#11161d;--line:#26303b;--text:#f4f2ec;--muted:#8b96a4;--accent:#9a88ff;--soft:#c9ff3d;--bad:#ff6b8a}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 80% 0,rgba(154,136,255,.18),transparent 34%),var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif;padding:28px}
    .wrap{width:min(1080px,100%);margin:auto;border:1px solid var(--line);background:linear-gradient(135deg,rgba(17,22,29,.96),rgba(11,14,19,.96));border-radius:22px;padding:28px;box-shadow:0 28px 80px rgba(0,0,0,.45)}
    .pill{display:inline-flex;gap:8px;align-items:center;border:1px solid rgba(154,136,255,.35);background:rgba(154,136,255,.08);color:#dcd6ff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:850}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--soft);box-shadow:0 0 14px rgba(201,255,61,.28)}
    .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:900;margin:18px 0 12px}
    h1{font-size:clamp(34px,7vw,60px);line-height:.92;letter-spacing:-.06em;margin:0 0 12px}
    p.lead{color:var(--muted);line-height:1.6;margin:0 0 10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:16px}
    .card{border:1px solid var(--line);background:#0f141a;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
    .card:hover{border-color:var(--accent);transform:translateY(-3px)}
    .card.hero{grid-column:1/-1;border-color:rgba(201,255,61,.5);box-shadow:0 0 0 1px rgba(201,255,61,.15),0 20px 50px rgba(0,0,0,.4)}
    .banner{width:100%;aspect-ratio:1200/420;object-fit:cover;display:block;background:#0b0e13}
    .body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
    .head{display:flex;gap:12px;align-items:center;margin:-46px 0 10px;position:relative}
    .logo{width:64px;height:64px;border-radius:16px;border:2px solid var(--line);background:#0f141a;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,.5)}
    .cat{font-size:10px;letter-spacing:.14em;color:var(--soft);font-weight:900;text-transform:uppercase}
    .name{font-size:22px;font-weight:900;margin:2px 0 0}
    .creator{display:flex;align-items:center;gap:8px;margin:10px 0 6px}
    .creator img{width:30px;height:30px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;background:#222}
    .creator .by{font-size:13px;color:var(--muted)}
    .creator .by b{color:var(--text)}
    .creator a{color:var(--accent);font-weight:800;text-decoration:none;font-size:12px}
    .summary{color:var(--muted);line-height:1.5;font-size:14px;margin:6px 0 12px}
    .meta{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
    .tag{border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);border-radius:999px;padding:5px 9px;color:#cfd6df;font-size:11px;font-weight:750}
    .tag.star{border-color:rgba(201,255,61,.5);color:var(--soft);background:rgba(201,255,61,.06)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:auto}
    .btn{border-radius:10px;padding:9px 14px;font-weight:800;text-decoration:none;font-size:13px}
    .btn.primary{background:var(--accent);color:#0b0b12}
    .btn.ghost{border:1px solid var(--line);color:var(--text)}
    code{color:#e8edf5;word-break:break-all}
    .error{color:var(--bad);font-weight:800}
    .foot{margin-top:26px;color:var(--muted);font-size:12px;text-align:center}
    .foot a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="pill"><i class="dot"></i> Registry público activo</div>
    <p class="eyebrow">ClipDock Marketplace</p>
    <h1>Complementos de ClipDock</h1>
    <p class="lead">Extensiones y scripts para Adobe. ClipDock Remote es la extensión protagonista; el resto son creaciones de la comunidad.</p>
    <div id="plugins" class="grid"></div>
    <p class="foot">Catálogo: <code id="catalog-url">catalog.json</code></p>
  </main>
  <script>
    const catalogUrl = new URL('catalog.json', location.href).href;
    document.getElementById('catalog-url').textContent = catalogUrl;
    const pluginsEl = document.getElementById('plugins');
    const HERO = 'clipdock-remote-adobe';

    function esc(v){return String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    function joinUrl(base, part){ return new URL(String(part).replace(/^\/+/, ''), base).href; }

    async function liveCreator(handle, fallback){
      // Foto y nombre EN VIVO desde GitHub: si el creador cambia su avatar/nombre, aqui tambien cambia.
      const out = {
        name: (fallback && fallback.name) || handle || 'Autor',
        avatar: (fallback && fallback.avatar) || (handle ? `https://github.com/${handle}.png` : ''),
        url: (fallback && fallback.github) || (handle ? `https://github.com/${handle}` : '#')
      };
      if (handle){
        try{
          const r = await fetch(`https://api.github.com/users/${handle}`, {cache:'no-store'});
          if (r.ok){ const u = await r.json(); out.name = u.name || u.login || out.name; out.avatar = u.avatar_url || out.avatar; out.url = u.html_url || out.url; }
        }catch(_){}
      }
      return out;
    }

    async function loadMarketplace(){
      const catalog = await (await fetch('catalog.json', {cache:'no-store'})).json();
      const d = catalog.discovery || {};
      const folderUrl = d.pluginsFolderUrl || new URL('plugins/', location.href).href;
      const idxUrl = joinUrl(folderUrl, d.folderIndexFile || 'index.json');
      const idx = await (await fetch(idxUrl, {cache:'no-store'})).json();
      const folders = idx.folders || [];

      let plugins = await Promise.all(folders.map(async folder => {
        const manifestUrl = joinUrl(folderUrl, `${folder}/${d.manifestFile || 'plugin.json'}`);
        const m = await (await fetch(manifestUrl, {cache:'no-store'})).json();
        const zip = m.package && m.package.file;
        return { ...m, folder, manifestUrl,
          zipUrl: zip ? joinUrl(folderUrl, `${folder}/${zip}`) : '',
          logoUrl: joinUrl(folderUrl, `${folder}/${(m.images&&m.images.logo)||'logo.png'}`),
          bannerUrl: joinUrl(folderUrl, `${folder}/${(m.images&&m.images.banner)||'banner.png'}`) };
      }));

      // Protagonista primero, el resto por nombre
      plugins.sort((a,b) => (a.folder===HERO?-1:b.folder===HERO?1:String(a.name).localeCompare(String(b.name))));

      pluginsEl.innerHTML = plugins.map(p => {
        const hero = p.folder===HERO;
        const h = (p.creator&&p.creator.handle)||'';
        const ava = (p.creator&&p.creator.avatar) || (h?`https://github.com/${h}.png`:'');
        return `<article class="card${hero?' hero':''}" data-h="${esc(h)}">
          <img class="banner" src="${esc(p.bannerUrl)}" alt="${esc(p.name)}" loading="lazy">
          <div class="body">
            <div class="head">
              <img class="logo" src="${esc(p.logoUrl)}" alt="">
              <div><div class="cat">${esc(p.category||p.type||'Plugin')}</div><div class="name">${esc(p.name)}</div></div>
            </div>
            <div class="creator">
              <img class="ava" src="${esc(ava)}" alt="">
              <span class="by">por <b class="cname">${esc((p.creator&&p.creator.name)||'Autor')}</b></span>
              <a class="cprofile" href="${esc((p.creator&&p.creator.github)||'#')}" target="_blank" rel="noopener">Ver perfil</a>
            </div>
            <div class="summary">${esc(p.summary||p.description||'')}</div>
            <div class="meta">
              ${hero?'<b class="tag star">★ Protagonista</b>':''}
              <b class="tag">v${esc(p.version)}</b>
              <b class="tag">${esc((p.package&&p.package.sizeLabel)||'')}</b>
              ${(p.tags||[]).slice(0,3).map(t=>`<b class="tag">${esc(t)}</b>`).join('')}
            </div>
            <div class="actions">
              ${p.zipUrl?`<a class="btn primary" href="${esc(p.zipUrl)}">Descargar ZIP</a>`:''}
              <a class="btn ghost" href="${esc(p.manifestUrl)}" target="_blank" rel="noopener">Manifiesto</a>
            </div>
          </div>
        </article>`;
      }).join('');

      // Refrescar foto+nombre en vivo desde GitHub por cada creador unico
      const handles = [...new Set(plugins.map(p => p.creator && p.creator.handle).filter(Boolean))];
      for (const h of handles){
        const fb = (plugins.find(p => p.creator && p.creator.handle===h)||{}).creator;
        const live = await liveCreator(h, fb);
        document.querySelectorAll(`.card[data-h="${h}"]`).forEach(card => {
          const img = card.querySelector('.creator .ava'); if (img) img.src = live.avatar;
          const nm = card.querySelector('.cname'); if (nm) nm.textContent = live.name;
          const a = card.querySelector('.cprofile'); if (a) a.href = live.url;
        });
      }
    }
    loadMarketplace().catch(err => { pluginsEl.innerHTML = `<p class="error">${esc(err.message)}</p>`; });
  </script>
</body>
</html>
